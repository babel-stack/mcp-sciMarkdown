<!DOCTYPE html>

<body>
  <p>Euler's identity:
    <span class="math inline">\(e^{i\pi} + 1 = 0\)</span>
    is considered the most beautiful equation.
  </p>
  <p>The Gaussian integral:</p>
  <span class="math display">\[\int_{-\infty}^{\infty} e^{-x^2}\,dx = \sqrt{\pi}\]</span>
  <p>In physics, <span class="MathJax_Preview">\(E = mc^2\)</span> describes
  the equivalence of mass and energy.</p>
